<!-- TOP BANNER -->
<a
  href="index.html"
  style="
    text-decoration: none;
    display: block;
    position: sticky;
    top: 0;
    z-index: 999;
  "
>
  <div
    style="
      background: linear-gradient(135deg, #0f172a, #2563eb);
      padding: 16px 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
      cursor: pointer;
      transition: 0.3s;
    "
  >
    <div
      style="
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: white;
        color: #2563eb;
        padding: 12px 28px;
        border-radius: 40px;
        font-weight: 700;
        font-size: 14px;
        box-shadow: 0 6px 18px rgba(255, 255, 255, 0.25);
      "
    >
      <span style="font-size: 16px">⬆</span>
      <span>Back to Home</span>
    </div>
  </div>
</a>
